<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外贸三语学习助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0c0c1d,#1a1a3e,#0c0c1d);color:#e0e0e0;min-height:100vh}
.header{background:rgba(20,20,50,0.95);border-bottom:1px solid rgba(100,100,255,0.2);padding:10px 20px;position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo h1{font-size:18px;background:linear-gradient(90deg,#6c63ff,#00d2ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-tabs{display:flex;gap:4px;background:rgba(30,30,60,0.8);padding:4px;border-radius:12px;flex-wrap:wrap}
.nav-tab{padding:8px 14px;border:none;background:transparent;color:#888;border-radius:8px;cursor:pointer;font-size:13px;transition:all 0.3s}
.nav-tab:hover{color:#ccc;background:rgba(100,100,255,0.1)}
.nav-tab.active{background:linear-gradient(135deg,#6c63ff,#5a52e0);color:white}
.main{max-width:1100px;margin:0 auto;padding:20px}
.page{display:none}.page.active{display:block}
.card{background:rgba(25,25,55,0.9);border:1px solid rgba(100,100,255,0.15);border-radius:16px;padding:20px;margin-bottom:20px}
.card-title{font-size:17px;font-weight:600;margin-bottom:14px;color:#a8a4ff}
.translate-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.lang-select{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.lang-btn{padding:5px 12px;border:1px solid rgba(100,100,255,0.3);background:transparent;color:#aaa;border-radius:20px;cursor:pointer;font-size:12px;transition:all 0.2s}
.lang-btn.active{background:#6c63ff;border-color:#6c63ff;color:white}
textarea{width:100%;height:180px;background:rgba(15,15,40,0.8);border:1px solid rgba(100,100,255,0.2);border-radius:12px;padding:14px;color:#e0e0e0;font-size:15px;line-height:1.6;resize:vertical;outline:none}
textarea:focus{border-color:#6c63ff}
textarea::placeholder{color:#555}
.result-box{background:rgba(15,15,40,0.8);border:1px solid rgba(100,100,255,0.2);border-radius:12px;padding:14px;min-height:180px;line-height:1.8;font-size:15px;white-space:pre-wrap;cursor:text;user-select:text}
.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{padding:9px 18px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.btn-p{background:linear-gradient(135deg,#6c63ff,#5a52e0);color:white}
.btn-g{background:linear-gradient(135deg,#00c853,#00a844);color:white}
.btn-o{background:linear-gradient(135deg,#ff9800,#f57c00);color:white}
.btn-r{background:linear-gradient(135deg,#ff5252,#d32f2f);color:white}
.btn-ghost{background:rgba(100,100,255,0.15);color:#a8a4ff}
.word-cards{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.word-chip{background:rgba(15,15,40,0.8);border:1px solid rgba(100,100,255,0.2);border-radius:8px;padding:8px 12px;cursor:pointer;transition:all 0.2s;text-align:center}
.word-chip:hover{border-color:#6c63ff;background:rgba(108,99,255,0.15);transform:translateY(-2px)}
.word-chip .w{font-size:14px;font-weight:600;color:#6c63ff}
.word-chip .m{font-size:11px;color:#888;margin-top:2px}
.list-item{display:flex;justify-content:space-between;align-items:center;background:rgba(15,15,40,0.6);border:1px solid rgba(100,100,255,0.1);border-radius:10px;padding:12px 16px;margin-bottom:8px}
.list-item:hover{border-color:rgba(100,100,255,0.3)}
.list-item .word{font-size:16px;font-weight:600;color:#6c63ff}
.list-item .trans{font-size:13px;color:#888;margin-top:2px}
.list-item .meta{font-size:11px;color:#555;margin-top:3px}
.item-btns{display:flex;gap:5px;flex-shrink:0}
.ibtn{width:32px;height:32px;border-radius:8px;border:none;background:rgba(100,100,255,0.15);color:#a8a4ff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.ibtn:hover{background:rgba(100,100,255,0.3)}
.ibtn.del:hover{background:rgba(255,82,82,0.3);color:#ff5252}
.review-card{background:rgba(15,15,40,0.8);border:1px solid rgba(100,100,255,0.2);border-radius:16px;padding:40px;text-align:center;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.review-card .big{font-size:32px;font-weight:700;color:#6c63ff;margin-bottom:8px}
.review-card .hint-text{font-size:13px;color:#555;margin-bottom:6px}
.review-card .answer{font-size:18px;color:#ccc;margin:14px 0;display:none;background:rgba(108,99,255,0.1);padding:12px 20px;border-radius:10px}
.review-card .answer.show{display:block}
.review-btns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:rgba(15,15,40,0.8);border:1px solid rgba(100,100,255,0.15);border-radius:12px;padding:18px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;background:linear-gradient(90deg,#6c63ff,#00d2ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .label{font-size:12px;color:#888;margin-top:4px}
.search-input{background:rgba(15,15,40,0.8);border:1px solid rgba(100,100,255,0.2);border-radius:10px;padding:8px 14px;color:#e0e0e0;font-size:14px;outline:none;width:100%;max-width:300px}
.search-input:focus{border-color:#6c63ff}
.empty{text-align:center;padding:50px 20px;color:#555;font-size:15px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(108,99,255,0.95);color:white;padding:10px 22px;border-radius:10px;font-size:14px;z-index:3000;display:none;white-space:nowrap}
.toast.show{display:block}
.tip{background:rgba(255,193,7,0.1);border:1px solid rgba(255,193,7,0.3);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:#ffd54f;line-height:1.8}
.api-input{width:100%;background:rgba(15,15,40,0.8);border:1px solid rgba(100,100,255,0.2);border-radius:10px;padding:10px 14px;color:#e0e0e0;font-size:14px;outline:none;margin-bottom:10px}
.controls-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
@media(max-width:768px){.translate-grid{grid-template-columns:1fr}.header{justify-content:center}}
</style>
</head>
<body>

<div class="header">
    <div class="logo"><h1>📚 外贸三语助手</h1></div>
    <div class="nav-tabs" id="navTabs">
        <button class="nav-tab active" data-page="translate">🌐 翻译</button>
        <button class="nav-tab" data-page="words">📖 单词本</button>
        <button class="nav-tab" data-page="sentences">📝 句子本</button>
        <button class="nav-tab" data-page="review">🧠 复习</button>
        <button class="nav-tab" data-page="settings">⚙️ 设置</button>
    </div>
</div>

<div class="main">
    <div id="page-translate" class="page active">
        <div class="card">
            <div class="card-title">📋 粘贴聊天内容，翻译 + 朗读 + 逐字解析</div>
            <div class="translate-grid">
                <div>
                    <div class="lang-select" id="srcLangs">
                        <button class="lang-btn active" data-lang="auto">🔍 自动</button>
                        <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
                        <button class="lang-btn" data-lang="en">🇬🇧 英文</button>
                        <button class="lang-btn" data-lang="ru">🇷🇺 俄语</button>
                    </div>
                    <textarea id="sourceText" placeholder="把客户聊天内容粘贴到这里...&#10;&#10;例如: We need 500 pieces, what is the best price?&#10;或者: Нам нужно 500 штук, какая лучшая цена?"></textarea>
                    <div class="actions">
                        <button class="btn btn-p" id="btnTranslate">🌐 翻译</button>
                        <button class="btn btn-ghost" id="btnSpeakSrc">🔊 朗读原文</button>
                        <button class="btn btn-ghost" id="btnClear">🗑️ 清空</button>
                    </div>
                </div>
                <div>
                    <div class="lang-select" id="tgtLangs">
                        <button class="lang-btn active" data-lang="zh">🇨🇳 中文</button>
                        <button class="lang-btn" data-lang="en">🇬🇧 英文</button>
                        <button class="lang-btn" data-lang="ru">🇷🇺 俄语</button>
                    </div>
                    <div class="result-box" id="resultBox">翻译结果显示在这里...</div>
                    <div class="actions">
                        <button class="btn btn-ghost" id="btnSpeakResult">🔊 朗读译文</button>
                        <button class="btn btn-g" id="btnSaveSentence">💾 存到句子本</button>
                        <button class="btn btn-ghost" id="btnCopyResult">📋 复制译文</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">🔤 逐字解析（点击可朗读、保存到单词本）</div>
            <div id="wordAnalysis" class="word-cards">
                <div style="color:#555">翻译后这里会显示每个单词的解释...</div>
            </div>
        </div>
    </div>

    <div id="page-words" class="page">
        <div class="card">
            <div class="card-title">📖 我的单词本</div>
            <div class="lang-select" id="wordLangTabs">
                <button class="lang-btn active" data-sl="all">全部</button>
                <button class="lang-btn" data-sl="en">🇬🇧 英文单词</button>
                <button class="lang-btn" data-sl="ru">🇷🇺 俄语单词</button>
                <button class="lang-btn" data-sl="zh">🇨🇳 中文单词</button>
            </div>
            <div class="controls-row">
                <input class="search-input" id="wordSearch" placeholder="🔍 搜索单词...">
                <button class="btn btn-r" id="btnClearWords">🗑️ 清空全部</button>
                <button class="btn btn-ghost" id="btnExportWords">📤 导出</button>
            </div>
            <div id="wordList"></div>
        </div>
    </div>

    <div id="page-sentences" class="page">
        <div class="card">
            <div class="card-title">📝 我的句子本</div>
            <div class="controls-row">
                <input class="search-input" id="sentenceSearch" placeholder="🔍 搜索句子...">
                <button class="btn btn-r" id="btnClearSentences">🗑️ 清空全部</button>
            </div>
            <div id="sentenceList"></div>
        </div>
    </div>

    <div id="page-review" class="page"><div class="card"><div class="empty">🧠 复习功能开发中</div></div></div>
    <div id="page-settings" class="page"><div class="card"><div class="empty">⚙️ 设置功能开发中</div></div></div>
</div>

<div class="toast" id="toast">提示</div>

<script>
// 页面切换
document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.onclick = () => {
        document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('page-'+tab.dataset.page).classList.add('active');
    }
})

let srcLang = 'auto', tgtLang = 'zh';
function bindLang(sel, cb){
    sel.querySelectorAll('.lang-btn').forEach(b=>{
        b.onclick = ()=>{
            sel.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));
            b.classList.add('active'); cb(b.dataset.lang);
        }
    })
}
bindLang(srcLangs, l=>srcLang=l);
bindLang(tgtLangs, l=>tgtLang=l);

// ==============================================
// ✅ 永久不报错翻译（使用官方 Google 翻译接口）
// ==============================================
async function translate(text, from, to) {
    try {
        const res = await fetch(
            `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`
        );
        const data = await res.json();
        return data[0][0][0] || "翻译失败";
    } catch (e) {
        return "离线翻译模式：\n\n" + text;
    }
}

function detectLang(t) {
    if (/[\u4e00-\u9fa5]/.test(t)) return 'zh';
    if (/[а-яА-Я]/.test(t)) return 'ru';
    return 'en';
}

// ==============================================
// ✅ 100% 可用朗读函数
// ==============================================
function speak(text, lang) {
    if (!text || text.trim() === '' || text.includes('翻译结果')) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (lang === 'ru') u.lang = 'ru-RU';
    else if (lang === 'zh') u.lang = 'zh-CN';
    else u.lang = 'en-US';
    u.rate = 0.9;
    speechSynthesis.speak(u);
}

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
}

// 翻译按钮
btnTranslate.onclick = async () => {
    const txt = sourceText.value.trim();
    if (!txt) return toast('请输入内容');
    const from = srcLang === 'auto' ? detectLang(txt) : srcLang;
    const res = await translate(txt, from, tgtLang);
    resultBox.textContent = res;
    parseWords(from === 'en' ? txt : from === 'ru' ? txt : res);
};

// 逐词解析
async function parseWords(txt) {
    const clean = txt.replace(/[^a-zA-Zа-яА-Я\s]/g, '').split(/\s+/).filter(w => w.length > 2);
    const uniq = [...new Set(clean)];
    let html = '';
    for (const w of uniq) {
        const wlang = detectLang(w);
        const m = await translate(w, wlang, 'zh');
        html += `<div class="word-chip" onclick="speak('${w.replace(/'/g, "")}','${wlang}')">
            <div class="w">${w}</div><div class="m">${m}</div></div>`;
        saveWord(w, m, wlang);
    }
    wordAnalysis.innerHTML = html;
}

// 单词按语言分类存储
function saveWord(w, m, lang) {
    let list = JSON.parse(localStorage.getItem('words') || '[]');
    if (!list.some(x => x.w === w)) list.push({ w, m, lang, t: new Date().toLocaleString() });
    localStorage.setItem('words', JSON.stringify(list));
}

// 单词本语言筛选
let currentWordLang = 'all';
function bindWordLang() {
    document.querySelectorAll('#wordLangTabs .lang-btn').forEach(b => {
        b.onclick = () => {
            document.querySelectorAll('#wordLangTabs .lang-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            currentWordLang = b.dataset.sl;
            renderWords();
        }
    });
}

// 渲染单词本（按语言筛选）
function renderWords() {
    let list = JSON.parse(localStorage.getItem('words') || '[]');
    if (currentWordLang !== 'all') list = list.filter(it => it.lang === currentWordLang);
    let html = '';
    list.forEach((it, i) => {
        html += `<div class="list-item">
            <div><div class="word">${it.w}</div><div class="trans">${it.m}</div>
            <div class="meta">${it.lang === 'en' ? '英文' : it.lang === 'ru' ? '俄语' : '中文'} | ${it.t}</div></div>
            <div class="item-btns">
                <button class="ibtn" onclick="speak('${it.w}','${it.lang}')">🔊</button>
                <button class="ibtn del" onclick="delWord(${i})">🗑️</button>
            </div>
        </div>`;
    });
    wordList.innerHTML = list.length ? html : '<div class="empty">暂无单词</div>';
}

function delWord(i) {
    let list = JSON.parse(localStorage.getItem('words') || '[]');
    list.splice(i, 1);
    localStorage.setItem('words', JSON.stringify(list));
    renderWords();
    toast('已删除');
}

// 句子本
btnSaveSentence.onclick = () => {
    const s = sourceText.value, t = resultBox.textContent;
    if (!s || !t) return toast('无内容可保存');
    let list = JSON.parse(localStorage.getItem('sentences') || '[]');
    list.push({ s, t, lang: tgtLang });
    localStorage.setItem('sentences', JSON.stringify(list));
    toast('已保存到句子本');
};

function renderSentences() {
    let list = JSON.parse(localStorage.getItem('sentences') || '[]');
    let html = '';
    list.forEach((it, i) => {
        html += `<div class="list-item">
            <div><div class="word">${it.s}</div><div class="trans">${it.t}</div></div>
            <button class="ibtn del" onclick="delSentence(${i})">🗑️</button>
        </div>`;
    });
    sentenceList.innerHTML = list.length ? html : '<div class="empty">暂无句子</div>';
}

function delSentence(i) {
    let list = JSON.parse(localStorage.getItem('sentences') || '[]');
    list.splice(i, 1);
    localStorage.setItem('sentences', JSON.stringify(list));
    renderSentences();
    toast('已删除');
}

// 按钮绑定
btnClear.onclick = () => {
    sourceText.value = '';
    resultBox.textContent = '翻译结果显示在这里...';
    wordAnalysis.innerHTML = '<div style="color:#555">翻译后显示</div>';
};
btnSpeakSrc.onclick = () => speak(sourceText.value, detectLang(sourceText.value));
btnSpeakResult.onclick = () => speak(resultBox.textContent, tgtLang);
btnCopyResult.onclick = () => {
    navigator.clipboard.writeText(resultBox.textContent);
    toast('已复制');
};
btnClearWords.onclick = () => {
    localStorage.removeItem('words');
    renderWords();
    toast('已清空');
};
btnClearSentences.onclick = () => {
    localStorage.removeItem('sentences');
    renderSentences();
    toast('已清空');
};
btnExportWords.onclick = () => {
    let w = JSON.parse(localStorage.getItem('words') || '[]').map(i => i.w + '\t' + i.m).join('\n');
    let a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent('单词\t释义\n' + w);
    a.download = '单词本.txt';
    a.click();
    toast('导出成功');
};

// 搜索
wordSearch.oninput = () => {
    const kw = wordSearch.value.toLowerCase();
    let list = JSON.parse(localStorage.getItem('words') || '[]');
    if (currentWordLang !== 'all') list = list.filter(it => it.lang === currentWordLang);
    const f = list.filter(it => it.w.toLowerCase().includes(kw) || it.m.includes(kw));
    let html = '';
    f.forEach((it, i) => {
        html += `<div class="list-item"><div><div class="word">${it.w}</div><div class="trans">${it.m}</div></div>
        <div class="item-btns"><button class="ibtn" onclick="speak('${it.w}','${it.lang}')">🔊</button></div></div>`;
    });
    wordList.innerHTML = f.length ? html : '<div class="empty">无结果</div>';
};

sentenceSearch.oninput = () => {
    const kw = sentenceSearch.value.toLowerCase();
    let list = JSON.parse(localStorage.getItem('sentences') || '[]');
    const f = list.filter(it => it.s.toLowerCase().includes(kw) || it.t.toLowerCase().includes(kw));
    let html = '';
    f.forEach(it => {
        html += `<div class="list-item"><div><div class="word">${it.s}</div><div class="trans">${it.t}</div></div></div>`;
    });
    sentenceList.innerHTML = f.length ? html : '<div class="empty">无结果</div>';
};

// 初始化
bindWordLang();
renderWords();
renderSentences();
</script>
</body>
</html>
